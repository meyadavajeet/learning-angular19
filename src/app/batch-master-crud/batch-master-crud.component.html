<div class="py-3 px-3 px-md-4">
  <h3 class="mb-2">Batch Master CRUD</h3>
  <a
    href="https://freeprojectapi.com/api.html"
    target="_blank"
    class="small text-muted mb-3 d-inline-block"
    >API Documentation</a
  >
  <hr class="my-3" />
</div>

<div class="container-fluid px-3 px-md-4 pb-4">
  <div class="row g-3">
    <!-- Left: Table Section (8 columns) -->
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-light">
          <h5 class="mb-0">Batch List</h5>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Batch Name</th>
                  <th>Created Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                @for (item of batchList; track $index) {
                  <tr>
                    <td>{{ item.batchId }}</td>
                    <td>{{ item.batchName }}</td>
                    <td>{{ item.createdDate }}</td>
                    <td>
                      <button class="btn btn-sm btn-primary me-2">Edit</button>
                      <button class="btn btn-sm btn-danger">Delete</button>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Form Section (4 columns) -->
    <div class="col-12 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-header bg-light">
          <h5 class="mb-0">Add/Edit Batch</h5>
        </div>
        <div class="card-body p-4">
          <form #batchForm="ngForm">
            <div class="mb-3">
              <label for="batchName" class="form-label">Batch Name</label>
              <input
                id="batchName"
                name="batchName"
                type="text"
                class="form-control"
                [(ngModel)]="newBatchObj.batchName"
                placeholder="Enter batch name"
              />
            </div>
            <div class="mb-3">
              <label for="createdAt" class="form-label">Created At</label>
              <input
                id="createdAt"
                name="createdAt"
                type="date"
                class="form-control"
                [(ngModel)]="newBatchObj.createdDate"
              />
            </div>

            <div class="d-grid gap-2">
              <button
                type="button"
                (click)="onSaveBatch()"
                class="btn btn-primary btn-sm"
              >
                Save
              </button>
              <button type="button" class="btn btn-outline-secondary btn-sm">
                Clear
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
